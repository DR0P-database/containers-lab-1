version: '3.8'
services:
  postgres:
    name: lab1-test-postgres
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: myapp_test
    networks:
      - test-network
  app:
    name: lab1-test-app
    image: ghcr.io/${REPO_LC}/app:sha-${GITHUB_SHA_SHORT}
    environment:
      DB_HOST: postgres
      DB_PASSWORD: secret
      DB_NAME: myapp_test
    depends_on:
      - postgres
    networks:
      - test-network
  nginx:
    name: lab1-test-nginx
    image: ghcr.io/${REPO_LC}/nginx:sha-${GITHUB_SHA_SHORT}
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      - test-network
networks:
  test-network: