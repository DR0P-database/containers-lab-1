version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: myapp_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - test-network
  app:
    image: ghcr.io/${REPO_LC}/app:sha-${GITHUB_SHA_SHORT}
    environment:
      DB_HOST: postgres
      DB_PASSWORD: secret
      DB_NAME: myapp_test
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - test-network
  nginx:
    image: ghcr.io/${REPO_LC}/nginx:sha-${GITHUB_SHA_SHORT}
    ports:
      - "80:80"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/app/health"]
      interval: 5s
      retries: 10
    networks:
      - test-network
networks:
  test-network: